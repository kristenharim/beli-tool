<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Beli staging</title>
<style>
  :root { --accent:#2f6fed; --bg:#f6f7f9; --card:#fff; --line:#e6e8eb; --muted:#6b7280; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, system-ui, sans-serif; margin:0; background:var(--bg); color:#111;
         padding-bottom: 40px; }
  header { position: sticky; top:0; z-index:5; background:rgba(246,247,249,.92);
           backdrop-filter: saturate(1.4) blur(8px); border-bottom:1px solid var(--line);
           padding: 12px 16px calc(12px + env(safe-area-inset-top)); }
  header h1 { font-size:18px; margin:0; font-weight:600; }
  .tabs { margin-top:6px; display:flex; gap:8px; }
  .tab { font-size:13px; color:var(--muted); background:#eceef1; padding:4px 10px; border-radius:999px; }
  .tab b { color:#111; }
  main { max-width: 560px; margin: 0 auto; padding: 8px 14px; }
  h2 { font-size:15px; font-weight:600; color:var(--muted); margin: 18px 4px 8px; text-transform:uppercase; letter-spacing:.04em; }
  .grid { display:flex; flex-direction:column; gap:14px; }

  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden;
          box-shadow: 0 1px 2px rgba(0,0,0,.04); transition: box-shadow .15s, border-color .15s; }
  .card.sel { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(47,111,237,.18); }
  .thumb { position:relative; width:100%; aspect-ratio: 16/10; background:#e9ebef; overflow:hidden; }
  .gallery { display:flex; width:100%; height:100%; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; }
  .gallery::-webkit-scrollbar { display:none; }
  .slide { flex:0 0 100%; height:100%; scroll-snap-align:center; }
  .slide img { width:100%; height:100%; object-fit:cover; display:block; }
  .thumb.noimg .gallery { display:none; }
  .thumb.noimg::after { content:'🍽'; position:absolute; inset:0; display:flex; align-items:center;
                        justify-content:center; font-size:34px; opacity:.35; }
  .dots { position:absolute; left:0; right:0; bottom:10px; display:flex; gap:6px; justify-content:center; pointer-events:none; }
  .dots i { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.55); box-shadow:0 0 2px rgba(0,0,0,.45); transition:transform .12s; }
  .dots i.on { background:#fff; transform:scale(1.3); }
  .pcount { position:absolute; left:10px; bottom:10px; background:rgba(0,0,0,.55); color:#fff;
            font-size:12px; padding:3px 8px; border-radius:999px; backdrop-filter: blur(2px); }
  .check { position:absolute; top:10px; right:10px; width:30px; height:30px; border-radius:50%;
           background:rgba(255,255,255,.92); display:flex; align-items:center; justify-content:center;
           box-shadow:0 1px 3px rgba(0,0,0,.2); cursor:pointer; }
  .check input { appearance:none; width:20px; height:20px; border:2px solid #bbb; border-radius:50%; margin:0; }
  .check input:checked { background:var(--accent); border-color:var(--accent); }
  .check input:checked::after { content:'✓'; color:#fff; font-size:13px; display:flex; align-items:center;
            justify-content:center; height:100%; }

  .body { padding: 12px 14px 14px; }
  .name { font-size:17px; font-weight:600; line-height:1.25; }
  .muted { color:var(--muted); font-size:13.5px; margin-top:2px; }
  .ratings { display:flex; gap:8px; margin:12px 0 6px; }
  .ratings button { flex:1; font-size:22px; padding:8px 0; border:1.5px solid var(--line);
                    border-radius:12px; background:#fff; cursor:pointer; }
  .ratings button.sel { border-color:var(--accent); background:#eef3fe; transform: scale(1.03); }
  .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .actions button, .actions a { flex:1; min-width:96px; font-size:15px; padding:11px 10px; border:1px solid var(--line);
                    border-radius:12px; background:#fff; cursor:pointer; font-weight:500;
                    text-decoration:none; color:#111; display:flex; align-items:center; justify-content:center; }
  .actions .openbeli { flex:1 1 100%; background:var(--accent); color:#fff; border-color:var(--accent); }
  .actions .primary { background:#177a45; color:#fff; border-color:#177a45; }
  .actions .ghost { color:var(--muted); }

  #selbar { position: sticky; bottom: 0; z-index:6; display:none; gap:10px; align-items:center;
            background:#111; color:#fff; padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            border-radius:16px 16px 0 0; box-shadow:0 -4px 16px rgba(0,0,0,.18); }
  #selbar.show { display:flex; }
  #selbar .grow { flex:1; font-size:15px; }
  #selbar button { font-size:15px; font-weight:600; padding:10px 14px; border-radius:10px; border:none; cursor:pointer; }
  #selbar .danger { background:#ff5a4d; color:#fff; }
  #selbar .clear { background:#333; color:#fff; }
  .empty { text-align:center; color:var(--muted); padding:24px; font-size:14px; }
  .loading { text-align:center; color:var(--muted); padding:40px; }
</style>
</head>
<body>
<header>
  <h1>Beli staging</h1>
  <div class="tabs">
    <span class="tab">Been <b id="been-count">0</b></span>
    <span class="tab">Want to try <b id="want-count">0</b></span>
  </div>
</header>

<main>
  <div id="root" class="loading">Loading your visits…</div>
</main>

<div id="selbar">
  <span class="grow"><b id="selcount">0</b> selected</span>
  <button class="clear" onclick="clearSel()">Clear</button>
  <button class="danger" onclick="skipSelected()">Skip selected</button>
</div>

<script>
const selected = new Set();

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function arg(s){ return (s||'').replace(/\\/g,'').replace(/'/g,'').replace(/\n/g,' '); }

async function load(){
  selected.clear(); updateSelBar();
  const q = await (await fetch('/api/queue')).json();
  document.getElementById('been-count').textContent = q.been.length;
  document.getElementById('want-count').textContent = q.want_to_try.length;
  const root = document.getElementById('root');
  root.className = '';
  root.innerHTML =
    section('Been — rank & add', q.been, true) +
    section('Want to try', q.want_to_try, false) +
    reviewSection(q.review);
  initGalleries();
}

/* ---- swipeable photo galleries ---- */
function initGalleries(){
  document.querySelectorAll('.thumb').forEach(thumb => {
    const g = thumb.querySelector('.gallery');
    const dots = thumb.querySelector('.dots');
    if(!g || !dots) return;
    g.addEventListener('scroll', () => {
      const i = Math.round(g.scrollLeft / g.clientWidth);
      [...dots.children].forEach((d, idx) => d.classList.toggle('on', idx === i));
    }, {passive:true});
  });
}
function slideErr(img){
  const thumb = img.closest('.thumb');
  img.closest('.slide')?.remove();
  const g = thumb.querySelector('.gallery');
  if(g && !g.children.length){ thumb.classList.add('noimg'); thumb.querySelector('.dots')?.remove(); }
  else if(g && g.children.length <= 1){ thumb.querySelector('.dots')?.remove(); }
}

function section(title, items, isBeen){
  let html = `<h2>${title} (${items.length})</h2>`;
  if(!items.length){ return html + `<div class="empty">Nothing here right now 🎉</div>`; }
  html += '<div class="grid">';
  for(const it of items) html += card(it, isBeen);
  return html + '</div>';
}

/* ---- unmatched pile: places we couldn't map to a restaurant (read-only) ---- */
function reviewSection(items){
  if(!items || !items.length) return '';
  let html = `<h2>Couldn't match (${items.length})</h2>`;
  html += `<div class="empty" style="text-align:left">These couldn't be matched to a restaurant automatically — add them in Beli by hand.</div>`;
  html += '<div class="grid">';
  for(const it of items){
    const refs = (it.photo_refs && it.photo_refs.length) ? it.photo_refs : (it.photo_ref ? [it.photo_ref] : []);
    html += `<div class="card">`;
    if(refs.length){
      const slides = refs.map((r, i) =>
        `<div class="slide"><img ${i ? 'loading="lazy"' : ''} src="/api/photo/${encodeURIComponent(r)}" onerror="slideErr(this)"></div>`
      ).join('');
      html += `<div class="thumb"><div class="gallery">${slides}</div>${it.photo_count ? `<span class="pcount">${it.photo_count} photo${it.photo_count>1?'s':''}</span>` : ''}</div>`;
    }
    html += '<div class="body">';
    html += `<div class="name">${esc(it.raw_name) || 'Unknown place'}</div>`;
    if(it.visit_date) html += `<div class="muted">${it.visit_date}</div>`;
    html += `<div class="muted" style="margin-top:6px">No match found.</div>`;
    html += '</div></div>';
  }
  return html + '</div>';
}

function card(it, isBeen){
  const id = it.place_id || '';
  const ambiguous = it.status === 'ambiguous';
  let h = `<div class="card" data-id="${esc(id)}">`;

  if(isBeen){
    const refs = (it.photo_refs && it.photo_refs.length) ? it.photo_refs : (it.photo_ref ? [it.photo_ref] : []);
    const cls = refs.length ? 'thumb' : 'thumb noimg';
    const slides = refs.map((r, i) =>
      `<div class="slide"><img ${i ? 'loading="lazy"' : ''} src="/api/photo/${encodeURIComponent(r)}" onerror="slideErr(this)"></div>`
    ).join('');
    const dots = refs.length > 1
      ? `<div class="dots">${refs.map((_, i) => `<i class="${i === 0 ? 'on' : ''}"></i>`).join('')}</div>` : '';
    const checkbox = (!ambiguous && id)
      ? `<label class="check"><input type="checkbox" onchange="toggleSel('${arg(id)}', this)"></label>` : '';
    h += `<div class="${cls}">
            <div class="gallery">${slides}</div>
            ${it.photo_count ? `<span class="pcount">${it.photo_count} photo${it.photo_count>1?'s':''}</span>` : ''}
            ${checkbox}
            ${dots}
          </div>`;
  }

  h += '<div class="body">';
  // Unmatched maps saves have no resolved name — show what she saved, or the
  // candidate buttons below are a confirmation with nothing to confirm against.
  h += `<div class="name">${esc(it.name) || esc(it.raw_name) || '(pick one below)'}</div>`;
  if(it.address) h += `<div class="muted">${esc(it.address)}</div>`;
  if(isBeen && it.visit_date) h += `<div class="muted">${it.visit_date}</div>`;

  if(ambiguous){
    h += `<div class="muted" style="margin-top:8px">Which place was this?</div><div class="actions">`;
    for(const c of it.candidates){
      h += `<button onclick="added('${arg(c.place_id)}','${arg(c.name)}','${it.bucket}', null)">${esc(c.name)}</button>`;
    }
    h += `</div>`;
  } else {
    if(isBeen){
      h += '<div class="ratings">';
      for(const [emoji,val] of [['😍','loved'],['😐','fine'],['😞','disliked']])
        h += `<button data-rating="${val}">${emoji}</button>`;
      h += '</div>';
    }
    h += `<div class="actions">
            <a class="openbeli" href="https://beli.app.link/" onclick="copyName('${arg(it.name)}')">Copy name &amp; open Beli</a>
            <button class="primary" onclick="added('${arg(id)}','${arg(it.name)}','${it.bucket}', ratingFor(this))">Added ✓</button>
            <button class="ghost" onclick="skip('${arg(id)}')">Skip</button>
          </div>`;
  }
  return h + '</div></div>';
}

/* ---- rating selection ---- */
document.addEventListener('click', e => {
  const t = e.target.closest('[data-rating]');
  if(!t) return;
  const card = t.closest('.card');
  card.querySelectorAll('[data-rating]').forEach(b => b.classList.remove('sel'));
  t.classList.add('sel');
});
function ratingFor(btn){ const r = btn.closest('.card').querySelector('[data-rating].sel'); return r ? r.dataset.rating : null; }

/* ---- multi-select ---- */
function toggleSel(id, cb){
  if(cb.checked) selected.add(id); else selected.delete(id);
  cb.closest('.card').classList.toggle('sel', cb.checked);
  updateSelBar();
}
function updateSelBar(){
  document.getElementById('selcount').textContent = selected.size;
  document.getElementById('selbar').classList.toggle('show', selected.size > 0);
}
function clearSel(){
  selected.clear();
  document.querySelectorAll('.check input:checked').forEach(c => { c.checked = false; c.closest('.card').classList.remove('sel'); });
  updateSelBar();
}
async function skipSelected(){
  const ids = [...selected];
  if(!ids.length) return;
  if(!confirm(`Skip ${ids.length} place${ids.length>1?'s':''}? They won't show up again.`)) return;
  for(const id of ids){
    await fetch('/api/skip', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({place_id:id})});
  }
  load();
}

/* ---- clipboard (works over http via execCommand) ---- */
function copyName(name, btn){
  let ok = false;
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(name).catch(()=>{}); ok = true;
  } else {
    try {
      const el = document.createElement('textarea');
      el.value = name; el.contentEditable = true; el.readOnly = false;
      el.style.position='fixed'; el.style.left='-9999px';
      document.body.appendChild(el);
      const range = document.createRange(); range.selectNodeContents(el);
      const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
      el.setSelectionRange(0, name.length);
      ok = document.execCommand('copy');
      document.body.removeChild(el);
    } catch(e){ ok = false; }
  }
  if(btn){
    const o = btn.dataset.label || btn.textContent; btn.dataset.label = o;
    btn.textContent = ok ? 'Copied ✓ — paste in Beli' : 'Long-press name to copy';
    setTimeout(()=>{ btn.textContent = o; }, 1800);
  }
  return ok;
}

async function added(place_id, name, bucket, rating){
  await fetch('/api/added', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({place_id, name, bucket, rating})});
  load();
}
async function skip(place_id){
  await fetch('/api/skip', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({place_id})});
  load();
}

load();
</script>
</body>
</html>
